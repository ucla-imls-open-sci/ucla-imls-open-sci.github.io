name: Collaborative Multilingual Search and Discovery Systems
duration: 3h 00m
authors:
  - name: Eric Silberberg
    orcid: "0000-0002-4779-119X"
  - name: Jesus Alonso-Regalado
    orcid: "0000-0002-4813-1628"
  - name: Cate Kellett
    orcid: "0000-0001-7667-8730"
status: alpha
educationalLevel: Intermediate
abstract: >-
  Guides users through creating a lightweight, open-source search and discovery
  system for multilingual research materials using the Google Sheets API and
  JavaScript. Addresses challenges in making research collections publicly
  available and ethically represented. It also helps you to design a plan to
  promote your project and prompt participation and collaboration.
status_note: Completed a hybrid 8-week asynchronous cohort pilot in spring 2026; refining toward beta.
pilots:
  - date: 2026-05-06T00:00:00.000Z
    location: Virtual (listserv-recruited cohort)
    instructor: Eric Silberberg, Cate Kellett & Jesus Alonso-Regalado
    type: Alpha Pilot (hybrid async cohort)
keywords:
  - search
  - multilingual
  - discovery
  - google sheets api
  - javascript
learningResourceType: lesson
teaches:
  - >-
    Understand how description standards ensure ethical representation of data
    and multilingual access.
  - >-
    Create a JavaScript-based website search system retrieving data from Google
    Sheets.
  - >-
    Develop a plan to promote your project and encourage participation and
    collaboration in multilingual and culturally diverse contexts.
url: http://ucla-imls-open-sci.info/lc-multilingual-search-discovery-system/
