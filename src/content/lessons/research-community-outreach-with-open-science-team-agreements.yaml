name: Research Community Outreach with Open Science Team Agreements
duration: 2h 15m
authors:
  - name: Samantha Teplitzky
    orcid: "0000-0001-7071-332X"
  - name: Ariel Deardorff
    orcid: "0000-0001-8930-6089"
  - name: Samantha Wilairat
    orcid: "0000-0002-5836-4523"
status: alpha
educationalLevel: Introductory
abstract: >-
  Introduces the Open Science Team Agreement template as a practical tool for
  researchers and librarians to advocate for open science practices and plan
  research outreach activities.
